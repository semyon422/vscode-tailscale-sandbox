services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: ts-code
    hostname: ts-code
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: >-
        --exit-node=${TS_EXIT_NODE}
        --exit-node-allow-lan-access=true
        --accept-dns=true
    volumes:
      - ./tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    ports:
      - "127.0.0.1:8443:8080"
    healthcheck:
      test: ["CMD-SHELL", "tailscale --socket=/tmp/tailscaled.sock status --json 2>/dev/null | grep -q '\"BackendState\":\"Running\"'"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  code-server:
    image: codercom/code-server:latest
    container_name: code-server-ts
    depends_on:
      tailscale:
        condition: service_started
    network_mode: service:tailscale
    user: "${UID}:${GID}"
    environment:
      DOCKER_USER: ${USER_NAME}
      PASSWORD: ${CODE_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ./code-home:/home/coder
      - /home/${USER_NAME}:/workspaces/home
    command: --bind-addr 0.0.0.0:8080 /workspaces
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:8080/login', (res) => process.exit(res.statusCode === 200 || res.statusCode === 302 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped
